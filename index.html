  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line Coding Visualization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="particles" id="particles"></div>
    <h1 class="title">LINE CODING SIMULATOR</h1>
    
    <div class="controls">
      <div class="input-section">
        <label>:ENTER DATA STREAM:</label>
        <input type="text" id="binaryInput" placeholder="Eg: 10101...">
      </div>
      
      <div class="input-section">
        <label>:SELECT ANY TECHNIQUE:</label>
        <select id="codingSelect">
          <option value="unipolar">unipolar</option>
          <option value="rz">RZ</option>
          <option value="nrzl">NRZ‑L</option>
          <option value="nrzi">NRZ‑I</option>
          <option value="manchester">Manchester</option>
          <option value="dmanchester">Differential Manchester</option>
          <option value="ami">AMI</option>
          <option value="pseudoternary">Pseudoternary</option>
        </select>
      </div>
    </div>
    
    <button id="runAnimation" class="btn">RUN</button>
    <p id="errorMsg" class="error-message"></p>
    
    <div class="canvas-container">
      <canvas id="canvas" width="700" height="250"></canvas>
    </div>
    
    <button id="downloadGraph" class="btn"></button>
    
    <div id="infoBox" class="info-box"></div>
    <div class="wave"></div>
  </div>

  <script src="LineCoding.js"></script>
</body>
</html>
